name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.version }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "nuget_version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Publish (self-contained, win-x64)
        run: |
          dotnet publish src/RTMPProjector.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:Version=${{ steps.version.outputs.nuget_version }} `
            -o publish/

      - name: Ensure VLC native libs in publish output
        shell: pwsh
        run: |
          # The csproj CopyVlcToPublishDir target should have done this, but verify and
          # fall back to a manual copy from the build output directory if needed.
          if (Test-Path "publish\libvlc") {
            Write-Host "VLC libs already present in publish/"
          } else {
            $src = "src\bin\Release\net8.0-windows\win-x64\libvlc"
            if (Test-Path $src) {
              Copy-Item -Recurse -Force $src publish\
              Write-Host "VLC libs copied from $src"
            } else {
              Write-Error "VLC native libraries not found — video playback will fail!"
            }
          }

      - name: Zip release
        shell: pwsh
        run: |
          Compress-Archive -Path publish\* -DestinationPath RTMPProjector-${{ steps.version.outputs.tag }}-win-x64.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: RTMP Projector ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: RTMPProjector-${{ steps.version.outputs.tag }}-win-x64.zip
          body: |
            ## RTMP Projector ${{ steps.version.outputs.tag }}

            ### Installation
            1. Download the zip below and extract it anywhere
            2. Run `RTMPProjector.exe`
            3. On first launch, MediaMTX (~10 MB) is downloaded automatically

            ### Requirements
            - Windows 10 / 11 x64
            - No separate .NET install needed (self-contained)
            - FFmpeg in PATH only needed for the **Restream** feature

            See the [README](https://github.com/${{ github.repository }}/blob/main/README.md) for full setup instructions.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
