name: Build & Release

on:
  push:
    branches: [main]        # auto-release when Version in .csproj changes
    tags: ['v*']            # still works if you push a tag manually
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  # ── 1. Determine version and decide whether to release ───────────────────
  version:
    runs-on: ubuntu-latest
    outputs:
      tag:            ${{ steps.ver.outputs.tag }}
      nuget_version:  ${{ steps.ver.outputs.nuget_version }}
      should_release: ${{ steps.ver.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.version }}"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            # Push to main — read version from the .csproj
            VERSION=$(grep -oP '(?<=<Version>)[^<]+' src/RTMPProjector.csproj | head -1)
            TAG="v${VERSION}"
          fi

          echo "tag=$TAG"             >> $GITHUB_OUTPUT
          echo "nuget_version=${TAG#v}" >> $GITHUB_OUTPUT

          # Skip the build if a release for this tag already exists
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG}")
          if [ "$STATUS" = "200" ]; then
            echo "Release ${TAG} already exists — nothing to do."
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "New release: ${TAG}"
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

  # ── 2. Build and publish (only when there is something new to release) ───
  build:
    needs: version
    if: needs.version.outputs.should_release == 'true'
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish (self-contained, win-x64)
        run: |
          dotnet publish src/RTMPProjector.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:Version=${{ needs.version.outputs.nuget_version }} `
            -o publish/

      - name: Ensure VLC native libs in publish output
        shell: pwsh
        run: |
          $dest       = "publish\libvlc\win-x64"
          $pluginsDir = "$dest\plugins"
          $pluginCount = if (Test-Path $pluginsDir) { (Get-ChildItem $pluginsDir -Recurse -Filter "*.dll").Count } else { 0 }
          $hasLibvlc  = Test-Path "$dest\libvlc.dll"

          Write-Host "Pre-check — libvlc.dll: $hasLibvlc  plugins (recursive): $pluginCount DLLs"

          if ($hasLibvlc -and $pluginCount -gt 0) {
            Write-Host "VLC verified — skipping NuGet cache copy"
          } else {
            Write-Warning "VLC incomplete (libvlc=$hasLibvlc plugins=$pluginCount) — locating source"
            $vlcSrc = $null

            # ── Strategy 1: MSBuild wrote the package root path to a hint file ─────
            $hintFile = "publish\vlc-pkg-root.txt"
            if (Test-Path $hintFile) {
              $pkgRoot = (Get-Content $hintFile -Raw).Trim()
              Write-Host "MSBuild hint pkg root: $pkgRoot"
              if (Test-Path $pkgRoot) {
                Write-Host "`nVideoLAN.LibVLC.Windows package tree (from hint):"
                Get-ChildItem $pkgRoot -Recurse -ErrorAction SilentlyContinue |
                  ForEach-Object { Write-Host "  $($_.FullName.Substring($pkgRoot.Length))" }
                $dll = Get-ChildItem $pkgRoot -Recurse -Filter "libvlc.dll" `
                         -ErrorAction SilentlyContinue |
                       Where-Object { $_.FullName -notmatch "\\x86\\" } |
                       Select-Object -First 1
                if ($dll) {
                  Write-Host "Found via hint: $($dll.FullName)"
                  $vlcSrc = $dll.DirectoryName
                }
              }
            }

            # ── Strategy 2: dotnet nuget locals + recursive search ────────────────
            if (-not $vlcSrc) {
              $lines    = (& dotnet nuget locals global-packages -l 2>&1) -join "`n"
              Write-Host "dotnet nuget locals: $lines"
              $nugetRoot = $null
              if ($lines -match "global-packages:\s*(.+)") { $nugetRoot = $Matches[1].Trim() }
              Write-Host "NuGet root: '$nugetRoot'"

              if ($nugetRoot -and (Test-Path $nugetRoot)) {
                $pkgDir = Get-ChildItem $nugetRoot -Filter "videolan.libvlc.windows" `
                            -ErrorAction SilentlyContinue | Select-Object -First 1
                if ($pkgDir) {
                  Write-Host "`nVideoLAN.LibVLC.Windows package tree (from NuGet):"
                  Get-ChildItem $pkgDir.FullName -Recurse -ErrorAction SilentlyContinue |
                    ForEach-Object { Write-Host "  $($_.FullName.Substring($pkgDir.FullName.Length))" }
                  $dll = Get-ChildItem $pkgDir.FullName -Recurse -Filter "libvlc.dll" `
                           -ErrorAction SilentlyContinue |
                         Where-Object { $_.FullName -notmatch "\\x86\\" } |
                         Select-Object -First 1
                  if ($dll) {
                    Write-Host "Found via NuGet cache: $($dll.FullName)"
                    $vlcSrc = $dll.DirectoryName
                  } else {
                    Write-Host "libvlc.dll not found in package tree — tree dumped above"
                  }
                } else {
                  Write-Host "videolan.libvlc.windows dir not found under: $nugetRoot"
                  Write-Host "Packages present: $(Get-ChildItem $nugetRoot | Select-Object -ExpandProperty Name)"
                }
              }
            }

            # ── Strategy 3: broad search of entire NuGet cache root ───────────────
            if (-not $vlcSrc) {
              Write-Host "Falling back to broad NuGet cache search..."
              $lines    = (& dotnet nuget locals global-packages -l 2>&1) -join "`n"
              if ($lines -match "global-packages:\s*(.+)") {
                $nugetRoot = $Matches[1].Trim()
                $dll = Get-ChildItem $nugetRoot -Recurse -Filter "libvlc.dll" `
                         -ErrorAction SilentlyContinue |
                       Where-Object { $_.FullName -notmatch "\\x86\\" } |
                       Select-Object -First 1
                if ($dll) {
                  Write-Host "Found via broad search: $($dll.FullName)"
                  $vlcSrc = $dll.DirectoryName
                }
              }
            }

            if (-not $vlcSrc) {
              Write-Error "Could not locate VLC native libs after all strategies. Review tree dumps above."
              exit 1
            }

            Write-Host "Copying VLC from: $vlcSrc"
            New-Item -ItemType Directory -Force $dest | Out-Null
            $rc = (robocopy $vlcSrc $dest /E /IS /IT /NP /NFL /NDL /NJH /NJS)
            if ($LASTEXITCODE -gt 7) { Write-Error "robocopy failed ($LASTEXITCODE)"; exit 1 }
          }

          Remove-Item "publish\vlc-pkg-root.txt"    -ErrorAction SilentlyContinue
          Remove-Item "publish\vlc-native-root.txt"  -ErrorAction SilentlyContinue

          Write-Host "`nlibvlc\win-x64 tree:"
          Get-ChildItem $dest -Recurse | ForEach-Object {
            $rel = $_.FullName.Substring((Resolve-Path $dest).Path.Length + 1)
            Write-Host "  $rel"
          }

      - name: Bundle VC++ runtime DLLs with VLC
        shell: pwsh
        run: |
          $dest = "publish\libvlc\win-x64"
          $needed = @("vcruntime140.dll", "vcruntime140_1.dll", "msvcp140.dll")

          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsRoot = & $vswhere -latest -property installationPath 2>$null
          $redistRoot = if ($vsRoot) { Join-Path $vsRoot "VC\Redist\MSVC" } else { $null }

          foreach ($dll in $needed) {
            if (Test-Path "$dest\$dll") {
              Write-Host "$dll already present — skipping"; continue
            }
            $src = $null
            if ($redistRoot -and (Test-Path $redistRoot)) {
              $src = Get-ChildItem $redistRoot -Recurse -Filter $dll -ErrorAction SilentlyContinue |
                     Where-Object { $_.FullName -match "\\x64\\" } |
                     Select-Object -First 1
            }
            if (-not $src) {
              $src = Get-ChildItem "${env:ProgramFiles}\Microsoft Visual Studio" `
                       -Recurse -Filter $dll -ErrorAction SilentlyContinue |
                     Where-Object { $_.FullName -match "\\x64\\" } |
                     Select-Object -First 1
            }
            if ($src) {
              Copy-Item $src.FullName "$dest\$dll" -Force
              Write-Host "Bundled $dll from $($src.FullName)"
            } else {
              Write-Warning "$dll not found — users may need the VC++ Redistributable 2015-2022 x64"
            }
          }
          Write-Host "libvlc\win-x64 contents:"; Get-ChildItem $dest | Select-Object -ExpandProperty Name

      - name: Bundle MediaMTX binary
        shell: pwsh
        run: |
          $dest = "publish\mediamtx.exe"
          if (Test-Path $dest) { Write-Host "mediamtx.exe already present — skipping"; exit 0 }

          Write-Host "Fetching latest MediaMTX release info..."
          $headers = @{ "User-Agent" = "RTMPProjector-CI"; "Accept" = "application/json" }
          $rel  = Invoke-RestMethod "https://api.github.com/repos/bluenviron/mediamtx/releases/latest" -Headers $headers
          $asset = $rel.assets | Where-Object {
            $_.name -match "windows_amd64" -and $_.name -match "\.zip$"
          } | Select-Object -First 1
          if (-not $asset) { Write-Error "No windows_amd64 zip found in MediaMTX release"; exit 1 }

          Write-Host "Downloading $($asset.name) ($([math]::Round($asset.size/1MB, 1)) MB)..."
          $zip = Join-Path $env:TEMP "mediamtx.zip"
          Invoke-WebRequest $asset.browser_download_url -OutFile $zip -Headers $headers

          Write-Host "Extracting mediamtx.exe..."
          $tmp = Join-Path $env:TEMP "mediamtx_extract"
          if (Test-Path $tmp) { Remove-Item $tmp -Recurse -Force }
          Expand-Archive $zip $tmp
          $exe = Get-ChildItem $tmp -Recurse -Filter "mediamtx.exe" | Select-Object -First 1
          if (-not $exe) { Write-Error "mediamtx.exe not found in zip"; exit 1 }
          Copy-Item $exe.FullName $dest
          Remove-Item $tmp -Recurse -Force
          Remove-Item $zip -Force
          Write-Host "Bundled mediamtx.exe ($([math]::Round((Get-Item $dest).Length/1MB,1)) MB)"

      - name: Build Inno Setup installer
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            Write-Host "Inno Setup not found — installing via choco..."
            choco install innosetup --no-progress -y | Out-Null
            $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          }
          Write-Host "ISCC: $iscc"
          & $iscc `
            "/DAppVersion=${{ needs.version.outputs.nuget_version }}" `
            "installer\RTMPProjector.iss"
          if ($LASTEXITCODE -ne 0) { Write-Error "ISCC failed ($LASTEXITCODE)"; exit 1 }
          $src = "installer\RTMPProjector-${{ needs.version.outputs.nuget_version }}-Setup.exe"
          $dst = "RTMPProjector-${{ needs.version.outputs.tag }}-Setup.exe"
          Move-Item $src $dst
          Write-Host "Installer: $dst  ($('{0:F1}' -f ((Get-Item $dst).Length / 1MB)) MB)"

      - name: Zip release
        shell: pwsh
        run: |
          Compress-Archive -Path publish\* -DestinationPath RTMPProjector-${{ needs.version.outputs.tag }}-win-x64.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: RTMP Projector ${{ needs.version.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            RTMPProjector-${{ needs.version.outputs.tag }}-Setup.exe
            RTMPProjector-${{ needs.version.outputs.tag }}-win-x64.zip
          body: |
            ## RTMP Projector ${{ needs.version.outputs.tag }}

            ### Installation
            **Recommended:** Download `RTMPProjector-*-Setup.exe` — runs the installer, lets you pick the install folder, adds a Start Menu shortcut, and registers an uninstaller.

            **Portable:** Download the zip, extract it anywhere, and run `RTMPProjector.exe`.

            MediaMTX is bundled — no separate download needed.

            ### Requirements
            - Windows 10 / 11 x64
            - No separate .NET install needed (self-contained)
            - FFmpeg in PATH only needed for the **Restream** feature

            See the [README](https://github.com/${{ github.repository }}/blob/main/README.md) for full setup instructions.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
