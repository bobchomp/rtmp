name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.version }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "nuget_version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Publish (self-contained, win-x64)
        run: |
          dotnet publish src/RTMPProjector.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:Version=${{ steps.version.outputs.nuget_version }} `
            -o publish/

      - name: Ensure VLC native libs in publish output
        shell: pwsh
        run: |
          $dest       = "publish\libvlc\win-x64"
          $pluginsDir = "$dest\plugins"
          # -Recurse so plugins in subdirectories (access\, codec\, etc.) are counted
          $pluginCount = if (Test-Path $pluginsDir) { (Get-ChildItem $pluginsDir -Recurse -Filter "*.dll").Count } else { 0 }
          $hasLibvlc  = Test-Path "$dest\libvlc.dll"

          Write-Host "Pre-check — libvlc.dll: $hasLibvlc  plugins (recursive): $pluginCount DLLs"

          if ($hasLibvlc -and $pluginCount -gt 0) {
            Write-Host "VLC verified — skipping NuGet cache copy"
          } else {
            Write-Warning "VLC incomplete (libvlc=$hasLibvlc plugins=$pluginCount) — locating source"
            $vlcSrc = $null

            # ── Strategy 1: MSBuild wrote the package root path to a hint file ─────
            $hintFile = "publish\vlc-pkg-root.txt"
            if (Test-Path $hintFile) {
              $pkgRoot = (Get-Content $hintFile -Raw).Trim()
              Write-Host "MSBuild hint pkg root: $pkgRoot"
              if (Test-Path $pkgRoot) {
                Write-Host "`nVideoLAN.LibVLC.Windows package tree (from hint):"
                Get-ChildItem $pkgRoot -Recurse -ErrorAction SilentlyContinue |
                  ForEach-Object { Write-Host "  $($_.FullName.Substring($pkgRoot.Length))" }
                $dll = Get-ChildItem $pkgRoot -Recurse -Filter "libvlc.dll" `
                         -ErrorAction SilentlyContinue |
                       Where-Object { $_.FullName -notmatch "\\x86\\" } |
                       Select-Object -First 1
                if ($dll) {
                  Write-Host "Found via hint: $($dll.FullName)"
                  $vlcSrc = $dll.DirectoryName
                }
              }
            }

            # ── Strategy 2: dotnet nuget locals + recursive search ────────────────
            if (-not $vlcSrc) {
              $lines    = (& dotnet nuget locals global-packages -l 2>&1) -join "`n"
              Write-Host "dotnet nuget locals: $lines"
              $nugetRoot = $null
              if ($lines -match "global-packages:\s*(.+)") { $nugetRoot = $Matches[1].Trim() }
              Write-Host "NuGet root: '$nugetRoot'"

              if ($nugetRoot -and (Test-Path $nugetRoot)) {
                # Case-insensitive glob — package dir may be lowercased
                $pkgDir = Get-ChildItem $nugetRoot -Filter "videolan.libvlc.windows" `
                            -ErrorAction SilentlyContinue | Select-Object -First 1
                if ($pkgDir) {
                  Write-Host "`nVideoLAN.LibVLC.Windows package tree (from NuGet):"
                  Get-ChildItem $pkgDir.FullName -Recurse -ErrorAction SilentlyContinue |
                    ForEach-Object { Write-Host "  $($_.FullName.Substring($pkgDir.FullName.Length))" }
                  $dll = Get-ChildItem $pkgDir.FullName -Recurse -Filter "libvlc.dll" `
                           -ErrorAction SilentlyContinue |
                         Where-Object { $_.FullName -notmatch "\\x86\\" } |
                         Select-Object -First 1
                  if ($dll) {
                    Write-Host "Found via NuGet cache: $($dll.FullName)"
                    $vlcSrc = $dll.DirectoryName
                  } else {
                    Write-Host "libvlc.dll not found in package tree — tree dumped above"
                  }
                } else {
                  Write-Host "videolan.libvlc.windows dir not found under: $nugetRoot"
                  Write-Host "Packages present: $(Get-ChildItem $nugetRoot | Select-Object -ExpandProperty Name)"
                }
              }
            }

            # ── Strategy 3: broad search of entire NuGet cache root ───────────────
            if (-not $vlcSrc) {
              Write-Host "Falling back to broad NuGet cache search..."
              $lines    = (& dotnet nuget locals global-packages -l 2>&1) -join "`n"
              if ($lines -match "global-packages:\s*(.+)") {
                $nugetRoot = $Matches[1].Trim()
                $dll = Get-ChildItem $nugetRoot -Recurse -Filter "libvlc.dll" `
                         -ErrorAction SilentlyContinue |
                       Where-Object { $_.FullName -notmatch "\\x86\\" } |
                       Select-Object -First 1
                if ($dll) {
                  Write-Host "Found via broad search: $($dll.FullName)"
                  $vlcSrc = $dll.DirectoryName
                }
              }
            }

            if (-not $vlcSrc) {
              Write-Error "Could not locate VLC native libs after all strategies. Review tree dumps above."
              exit 1
            }

            Write-Host "Copying VLC from: $vlcSrc"
            New-Item -ItemType Directory -Force $dest | Out-Null
            # Use robocopy instead of Copy-Item: the wildcard+recurse form of Copy-Item
            # has a known PowerShell bug where it creates subdirs but skips their contents.
            # Robocopy /E copies the full tree reliably; exit codes 0-7 all mean success.
            $rc = (robocopy $vlcSrc $dest /E /IS /IT /NP /NFL /NDL /NJH /NJS)
            if ($LASTEXITCODE -gt 7) { Write-Error "robocopy failed ($LASTEXITCODE)"; exit 1 }
          }

          # Clean up hint files — not part of the app
          Remove-Item "publish\vlc-pkg-root.txt"   -ErrorAction SilentlyContinue
          Remove-Item "publish\vlc-native-root.txt" -ErrorAction SilentlyContinue

          # Always print final tree so CI logs show exactly what goes into the zip
          Write-Host "`nlibvlc\win-x64 tree:"
          Get-ChildItem $dest -Recurse | ForEach-Object {
            $rel = $_.FullName.Substring((Resolve-Path $dest).Path.Length + 1)
            Write-Host "  $rel"
          }

      - name: Bundle VC++ runtime DLLs with VLC
        shell: pwsh
        run: |
          # VLC's native DLLs are compiled with MSVC and require the VC++ runtime.
          # Use vswhere to locate VS, then copy from the Redist folder (licensed
          # for redistribution) so users don't need the VC++ Redistributable.
          $dest = "publish\libvlc\win-x64"
          $needed = @("vcruntime140.dll", "vcruntime140_1.dll", "msvcp140.dll")

          # Locate VS installation via vswhere
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsRoot = & $vswhere -latest -property installationPath 2>$null
          $redistRoot = if ($vsRoot) { Join-Path $vsRoot "VC\Redist\MSVC" } else { $null }

          foreach ($dll in $needed) {
            if (Test-Path "$dest\$dll") {
              Write-Host "$dll already present — skipping"; continue
            }
            # Try Redist folder first (most reliable), then fall back to a broader search
            $src = $null
            if ($redistRoot -and (Test-Path $redistRoot)) {
              $src = Get-ChildItem $redistRoot -Recurse -Filter $dll -ErrorAction SilentlyContinue |
                     Where-Object { $_.FullName -match "\\x64\\" } |
                     Select-Object -First 1
            }
            if (-not $src) {
              $src = Get-ChildItem "${env:ProgramFiles}\Microsoft Visual Studio" `
                       -Recurse -Filter $dll -ErrorAction SilentlyContinue |
                     Where-Object { $_.FullName -match "\\x64\\" } |
                     Select-Object -First 1
            }
            if ($src) {
              Copy-Item $src.FullName "$dest\$dll" -Force
              Write-Host "Bundled $dll from $($src.FullName)"
            } else {
              Write-Warning "$dll not found — users may need the VC++ Redistributable 2015-2022 x64"
            }
          }
          Write-Host "libvlc\win-x64 contents:"; Get-ChildItem $dest | Select-Object -ExpandProperty Name

      - name: Zip release
        shell: pwsh
        run: |
          Compress-Archive -Path publish\* -DestinationPath RTMPProjector-${{ steps.version.outputs.tag }}-win-x64.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: RTMP Projector ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: RTMPProjector-${{ steps.version.outputs.tag }}-win-x64.zip
          body: |
            ## RTMP Projector ${{ steps.version.outputs.tag }}

            ### Installation
            1. Download the zip below and extract it anywhere
            2. Run `RTMPProjector.exe`
            3. On first launch, MediaMTX (~10 MB) is downloaded automatically

            ### Requirements
            - Windows 10 / 11 x64
            - No separate .NET install needed (self-contained)
            - FFmpeg in PATH only needed for the **Restream** feature

            See the [README](https://github.com/${{ github.repository }}/blob/main/README.md) for full setup instructions.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
